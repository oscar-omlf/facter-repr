name: facter-repro
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas
  - requests
  - pyarrow
  - scikit-learn
  - tqdm
  - pytorch
  - pytorch-cuda=12.1  # remove this line if CPU-only
  - pip:
      - transformers>=4.40
      - accelerate>=0.25
      - sentence-transformers>=2.7
      - mlflow>=2.10
      - codecarbon>=2.4
